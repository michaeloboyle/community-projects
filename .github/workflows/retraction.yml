name: Retraction

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  propose-retraction:
    runs-on: ubuntu-latest
    concurrency:
      group: retraction-${{ github.event.issue.number }}
      cancel-in-progress: true
    if: github.event.comment.body == '/retract'
    steps:
      - name: Post retraction proposal
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
        with:
          script: |
            // SEC-003: Verify commenter is an org member/collaborator
            const validAssociations = ['MEMBER', 'OWNER', 'COLLABORATOR'];
            const association = context.payload.comment.author_association;
            if (!validAssociations.includes(association)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `@${context.payload.comment.user.login} Only organization members, owners, or collaborators can perform this action.`
              });
              return;
            }

            const proposer = context.payload.comment.user.login;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `### Retraction Proposed by @${proposer}`,
                '',
                'A committee member has proposed retracting approval of this project.',
                '',
                '**Grounds for retraction** (per governance doc):',
                '- Violation of code of conduct or values',
                '- Misrepresentation of project or licensing',
                '- Inactive/abandoned maintenance impacting trust',
                '- Legal, ethical, or reputational risk',
                '- Loss of membership standing',
                '',
                'Committee members: vote with `/vote retract` to support retraction.',
                'A simple majority (50% + 1) is required.',
                '',
                '---',
                '*Automated retraction proposal.*'
              ].join('\n')
            });

  tally-retraction:
    runs-on: ubuntu-latest
    if: github.event.comment.body == '/vote retract'
    concurrency:
      group: retraction-${{ github.event.issue.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Tally retraction votes
        id: tally
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
        env:
          QUORUM: '3'
        with:
          script: |
            const fs = require('fs');
            const quorum = parseInt(process.env.QUORUM);

            // SEC-003: Verify commenter is an org member/collaborator
            const validAssociations = ['MEMBER', 'OWNER', 'COLLABORATOR'];
            const association = context.payload.comment.author_association;
            if (!validAssociations.includes(association)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `@${context.payload.comment.user.login} Only organization members, owners, or collaborators can perform this action.`
              });
              return;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            // Count unique retraction votes
            const voters = new Set();
            for (const c of comments) {
              if (c.body.trim() === '/vote retract') {
                voters.add(c.user.login);
              }
            }

            const voteCount = voters.size;

            // SEC-008: Rate limit - skip if bot posted a tally within last 5 minutes
            const recentBotTally = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              (c.body.includes('Vote Tally') || c.body.includes('Vote —')) &&
              (Date.now() - new Date(c.created_at).getTime()) < 300000
            );
            if (recentBotTally && voteCount < quorum) {
              return; // Skip posting duplicate tally
            }

            if (voteCount < quorum) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `**Retraction Vote Tally** — ${voteCount}/${quorum} votes (quorum not yet reached)`
              });
              return;
            }

            // Quorum reached — retract
            // SEC-009: Validate registry schema
            const registryPath = 'data/approved-projects.json';
            let registry;
            try {
              registry = JSON.parse(fs.readFileSync(registryPath, 'utf8'));
              if (!Array.isArray(registry)) {
                throw new Error('Registry must be an array');
              }
            } catch (e) {
              const core = require('@actions/core');
              core.setFailed(`Registry validation failed: ${e.message}`);
              return;
            }
            const issueNumber = context.issue.number;

            const idx = registry.findIndex(p => p.issue_number === issueNumber);
            if (idx !== -1) {
              registry[idx].status = 'retracted';
              registry[idx].retracted_date = new Date().toISOString().split('T')[0];
              fs.writeFileSync(registryPath, JSON.stringify(registry, null, 2) + '\n');

              core.setOutput('updated_registry', 'true');
              core.setOutput('issue_number', String(issueNumber));
            }

            // Update labels
            const labels = (await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            })).data.map(l => l.name);

            for (const sl of labels.filter(l => l.startsWith('status:'))) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: sl
                });
              } catch (e) { /* ok */ }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['status:retracted']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                '### Retraction Vote — Result: RETRACTED',
                '',
                `Votes to retract: ${voteCount} (quorum: ${quorum})`,
                '',
                'This project\'s approval has been **retracted**. It has been marked as retracted in the registry.',
                '',
                'Actions that may follow:',
                '- Removal from Foundation website',
                '- Withdrawal of support',
                '- Termination of active collaboration',
                '',
                '---',
                '*Automated retraction result.*'
              ].join('\n')
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed',
              state_reason: 'not_planned'
            });

      - name: Commit registry update
        if: steps.tally.outputs.updated_registry == 'true'
        env:
          ISSUE_NUMBER: ${{ steps.tally.outputs.issue_number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/approved-projects.json
          git commit -m "Retract project from issue #${ISSUE_NUMBER}" || exit 0
          git pull --rebase origin main
          git push
