name: Escalation Vote

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  tally-escalation:
    runs-on: ubuntu-latest
    concurrency:
      group: escalation-${{ github.event.issue.number }}
      cancel-in-progress: true
    if: |
      startsWith(github.event.comment.body, '/vote escalate') ||
      startsWith(github.event.comment.body, '/vote no-escalate')
    steps:
      - name: Tally escalation votes
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
        env:
          QUORUM: '3'
        with:
          script: |
            const quorum = parseInt(process.env.QUORUM);

            // SEC-003: Verify commenter is an org member/collaborator
            const validAssociations = ['MEMBER', 'OWNER', 'COLLABORATOR'];
            const association = context.payload.comment.author_association;
            if (!validAssociations.includes(association)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `@${context.payload.comment.user.login} Only organization members, owners, or collaborators can perform this action.`
              });
              return;
            }

            // Fetch all comments
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            // Tally votes (one per unique user, last vote wins)
            const votes = {};
            for (const c of comments) {
              const body = c.body.trim();
              if (body.startsWith('/vote escalate') && !body.startsWith('/vote escalate ') === false) {
                // Match exactly "/vote escalate" (not "/vote escalate-something")
                if (/^\/vote escalate\s*$/.test(body)) {
                  votes[c.user.login] = 'escalate';
                }
              }
              if (/^\/vote no-escalate\s*$/.test(body)) {
                votes[c.user.login] = 'no-escalate';
              }
            }

            const escalate = Object.values(votes).filter(v => v === 'escalate').length;
            const noEscalate = Object.values(votes).filter(v => v === 'no-escalate').length;
            const totalVotes = escalate + noEscalate;

            // SEC-008: Rate limit - skip if bot posted a tally within last 5 minutes
            const recentBotTally = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              (c.body.includes('Vote Tally') || c.body.includes('Vote —')) &&
              (Date.now() - new Date(c.created_at).getTime()) < 300000
            );
            if (recentBotTally && totalVotes < quorum) {
              return; // Skip posting duplicate tally
            }

            // Apply label to track voting phase
            const labels = (await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            })).data.map(l => l.name);

            if (!labels.includes('status:escalation-vote')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['status:escalation-vote']
              });
            }

            // Check if quorum reached
            if (totalVotes < quorum) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `**Escalation Vote Tally** — ${totalVotes}/${quorum} votes cast (quorum not yet reached)\n\n| | Count |\n|---|---|\n| Escalate | ${escalate} |\n| No Escalate | ${noEscalate} |`
              });
              return;
            }

            // Quorum reached — determine outcome
            const majority = Math.floor(totalVotes / 2) + 1;
            const escalated = escalate >= majority;

            if (escalated) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['escalated']
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: [
                  '### Escalation Vote — Result: ESCALATED',
                  '',
                  `Votes: ${escalate} escalate, ${noEscalate} no-escalate (quorum: ${quorum})`,
                  '',
                  'This submission has been **escalated to senior leadership** for further review.',
                  '',
                  '---',
                  '*Automated escalation vote result.*'
                ].join('\n')
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: [
                  '### Escalation Vote — Result: NOT ESCALATED',
                  '',
                  `Votes: ${escalate} escalate, ${noEscalate} no-escalate (quorum: ${quorum})`,
                  '',
                  'This submission does **not** require escalation. Proceeding to validation vote.',
                  '',
                  'Committee members may now vote: `/vote approve`, `/vote decline`, or `/vote defer`.',
                  '',
                  '---',
                  '*Automated escalation vote result.*'
                ].join('\n')
              });
              // Remove escalation-vote label, add validation-vote
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: 'status:escalation-vote'
                });
              } catch (e) { /* label may not exist */ }
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['status:validation-vote']
              });
            }
